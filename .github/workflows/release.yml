name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch: # Manual trigger for testing

env:
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  # Build macOS separately to fix code signature
  build-macos:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: "aarch64-apple-darwin"
            arch: "aarch64"
          - target: "x86_64-apple-darwin"
            arch: "x64"

    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Syphon framework
        uses: actions/cache@v4
        id: syphon-cache
        with:
          path: src-tauri/frameworks/Syphon.framework
          key: macos-syphon-v5-${{ matrix.arch }}

      - name: Install Syphon (macOS)
        if: steps.syphon-cache.outputs.cache-hit != 'true'
        run: ./scripts/install-syphon.sh --clean

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Cache node_modules
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Install frontend dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          cache-on-failure: true
          shared-key: "macos-${{ matrix.target }}"

      - name: Import Apple Developer certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Build Tauri app (signed + notarized)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: npm run tauri build -- --target ${{ matrix.target }} -- --no-default-features

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH" || true

      - name: Show sccache stats
        run: sccache --show-stats

      - name: Verify updater artifacts were produced
        run: |
          BUNDLE_PATH="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          echo "=== Bundle directory contents ==="
          ls -la "$BUNDLE_PATH/" || echo "Bundle dir not found!"
          echo "=== Looking for updater files ==="
          find src-tauri/target/${{ matrix.target }}/release/bundle -name "*.tar.gz" -o -name "*.sig" | sort
          if ! ls "$BUNDLE_PATH"/*.app.tar.gz 1>/dev/null 2>&1; then
            echo "ERROR: No .app.tar.gz found — signing likely failed. Check TAURI_SIGNING_PRIVATE_KEY."
            exit 1
          fi
          echo "✅ Updater artifacts found."

      - name: Upload DMG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: updater-macos-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error

  # Build Linux and Windows with tauri-action (no signature issues)
  build-linux-windows:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-22.04"
            args: "-- --no-default-features"
            rust_targets: ""
          - platform: "windows-latest"
            args: "-- --no-default-features"
            rust_targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev libhidapi-dev libudev-dev
          version: 1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Cache node_modules
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Install frontend dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          cache-on-failure: true
          shared-key: "${{ matrix.platform }}"

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- ${{ matrix.args }}

      - name: Show sccache stats
        run: sccache --show-stats

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload Linux updater artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: updater-linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage.sig
            src-tauri/target/release/bundle/deb/*.deb.sig
          if-no-files-found: error

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

      - name: Upload Windows updater artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: updater-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
          if-no-files-found: error

  # Create release and upload all artifacts
  release:
    needs: [build-macos, build-linux-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -name "*" | sort

      - name: Generate latest.json
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${VERSION}"

          # Read signatures
          read_sig() { cat "$1" 2>/dev/null || echo ""; }

          SIG_MACOS_AARCH64=$(read_sig artifacts/updater-macos-aarch64/*.app.tar.gz.sig)
          SIG_MACOS_X64=$(read_sig artifacts/updater-macos-x64/*.app.tar.gz.sig)
          SIG_LINUX=$(read_sig artifacts/updater-linux/appimage/*.AppImage.sig)
          SIG_WINDOWS=$(read_sig artifacts/updater-windows/*.exe.sig)

          FILENAME_MACOS_AARCH64=$(basename artifacts/updater-macos-aarch64/*.app.tar.gz)
          FILENAME_MACOS_X64=$(basename artifacts/updater-macos-x64/*.app.tar.gz)
          FILENAME_LINUX=$(basename artifacts/updater-linux/appimage/*.AppImage.sig | sed 's/\.sig$//')
          FILENAME_WINDOWS=$(basename artifacts/updater-windows/*.exe.sig | sed 's/\.sig$//')

          # Fail fast if any filename resolved to a glob (file not found)
          for f in "$FILENAME_MACOS_AARCH64" "$FILENAME_MACOS_X64" "$FILENAME_LINUX" "$FILENAME_WINDOWS"; do
            if [[ "$f" == *'*'* ]]; then
              echo "ERROR: Updater file not found: $f — signing may have failed in a build job."
              exit 1
            fi
          done

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "See the release page for details: https://github.com/${REPO}/releases/tag/${VERSION}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "url": "${BASE_URL}/${FILENAME_MACOS_AARCH64}",
                "signature": "${SIG_MACOS_AARCH64}"
              },
              "darwin-x86_64": {
                "url": "${BASE_URL}/${FILENAME_MACOS_X64}",
                "signature": "${SIG_MACOS_X64}"
              },
              "linux-x86_64": {
                "url": "${BASE_URL}/${FILENAME_LINUX}",
                "signature": "${SIG_LINUX}"
              },
              "windows-x86_64": {
                "url": "${BASE_URL}/${FILENAME_WINDOWS}",
                "signature": "${SIG_WINDOWS}"
              }
            }
          }
          EOF

          echo "Generated latest.json:"
          cat latest.json

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.VERSION }}
          draft: true
          prerelease: false
          body: |
            ## Download

            Choose the appropriate installer for your platform:

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `.dmg` (aarch64) |
            | macOS (Intel) | `.dmg` (x64) |
            | Windows | `.exe` or `.msi` |
            | Linux | `.AppImage`, `.deb`, or `.rpm` |

            ### macOS Note

            This app is signed and notarized by Apple. It should open without any security warnings.
          files: |
            artifacts/macos-aarch64/*.dmg
            artifacts/macos-x64/*.dmg
            artifacts/updater-macos-aarch64/*.app.tar.gz
            artifacts/updater-macos-aarch64/*.app.tar.gz.sig
            artifacts/updater-macos-x64/*.app.tar.gz
            artifacts/updater-macos-x64/*.app.tar.gz.sig
            artifacts/linux/deb/*.deb
            artifacts/linux/rpm/*.rpm
            artifacts/linux/appimage/*.AppImage
            artifacts/updater-linux/*.AppImage.sig
            artifacts/updater-linux/*.deb.sig
            artifacts/windows/nsis/*.exe
            artifacts/windows/msi/*.msi
            artifacts/updater-windows/*.exe.sig
            latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Slack
        if: success()
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🤖 Slew ${{ steps.version.outputs.VERSION }} draft release is ready for publishing!\n<${{ github.server_url }}/${{ github.repository }}/releases|View Release>"
            }
