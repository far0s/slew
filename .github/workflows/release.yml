name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch: # Manual trigger for testing

env:
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  # Build macOS separately to fix code signature
  build-macos:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: "aarch64-apple-darwin"
            arch: "aarch64"
          - target: "x86_64-apple-darwin"
            arch: "x64"

    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Syphon framework
        uses: actions/cache@v4
        id: syphon-cache
        with:
          path: src-tauri/frameworks/Syphon.framework
          key: macos-syphon-v5-${{ matrix.arch }}

      - name: Install Syphon (macOS)
        if: steps.syphon-cache.outputs.cache-hit != 'true'
        run: ./scripts/install-syphon.sh --clean

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Cache node_modules
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Install frontend dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          cache-on-failure: true
          shared-key: "macos-${{ matrix.target }}"

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --target ${{ matrix.target }} -- --no-default-features

      - name: Show sccache stats
        run: sccache --show-stats

      - name: Verify updater artifacts were produced
        run: |
          BUNDLE_PATH="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          echo "=== Bundle directory contents ==="
          ls -la "$BUNDLE_PATH/" || echo "Bundle dir not found!"
          echo "=== Looking for updater files ==="
          find src-tauri/target/${{ matrix.target }}/release/bundle -name "*.tar.gz" -o -name "*.sig" | sort
          if ! ls "$BUNDLE_PATH"/*.app.tar.gz 1>/dev/null 2>&1; then
            echo "ERROR: No .app.tar.gz found — signing likely failed. Check TAURI_SIGNING_PRIVATE_KEY."
            exit 1
          fi
          echo "✅ Updater artifacts found."

      - name: Fix code signature
        run: |
          APP_PATH="src-tauri/target/${{ matrix.target }}/release/bundle/macos/Slew.app"
          DMG_PATH="src-tauri/target/${{ matrix.target }}/release/bundle/dmg"

          echo "Removing invalid signature and re-signing with ad-hoc..."
          codesign --remove-signature "$APP_PATH" || true
          codesign --force --deep -s - "$APP_PATH"

          echo "Verifying signature..."
          codesign -vv "$APP_PATH"

          echo "Recreating DMG with fixed app..."
          # Find the DMG file
          DMG_FILE=$(ls "$DMG_PATH"/*.dmg | head -1)
          DMG_NAME=$(basename "$DMG_FILE")
          echo "Original DMG: $DMG_FILE"

          # Convert to read-write format (hdiutil adds .dmg automatically, so we use a name without it)
          TEMP_DMG_BASE="$DMG_PATH/temp_rw"
          TEMP_DMG="${TEMP_DMG_BASE}.dmg"
          rm -f "$TEMP_DMG"
          hdiutil convert "$DMG_FILE" -format UDRW -o "$TEMP_DMG_BASE"
          echo "Converted to RW DMG: $TEMP_DMG"
          ls -la "$TEMP_DMG"

          # Attach without specifying mount point - let macOS choose
          echo "Attaching DMG..."
          ATTACH_OUTPUT=$(hdiutil attach "$TEMP_DMG" -nobrowse -noverify)
          echo "Attach output: $ATTACH_OUTPUT"

          # Find the mount point from attach output (last column of last line with /Volumes)
          MOUNT_POINT=$(echo "$ATTACH_OUTPUT" | grep "/Volumes" | awk -F'\t' '{print $NF}' | head -1)
          echo "Mount point: $MOUNT_POINT"

          if [ -z "$MOUNT_POINT" ] || [ ! -d "$MOUNT_POINT" ]; then
            echo "ERROR: Failed to find mount point"
            echo "Listing /Volumes:"
            ls -la /Volumes/
            exit 1
          fi

          # Remove old app and copy fixed one
          echo "Copying fixed app to DMG..."
          rm -rf "$MOUNT_POINT/Slew.app"
          cp -R "$APP_PATH" "$MOUNT_POINT/"

          # Sync and unmount
          sync
          echo "Detaching DMG..."
          hdiutil detach "$MOUNT_POINT"

          # Convert back to compressed DMG
          echo "Converting back to compressed DMG..."
          rm -f "$DMG_FILE"
          hdiutil convert "$TEMP_DMG" -format UDZO -o "${DMG_FILE%.dmg}"
          rm -f "$TEMP_DMG"

          echo "DMG recreated with properly signed app: $DMG_FILE"
          ls -la "$DMG_FILE"

      - name: Upload DMG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: updater-macos-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error

  # Build Linux and Windows with tauri-action (no signature issues)
  build-linux-windows:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-22.04"
            args: "-- --no-default-features"
            rust_targets: ""
          - platform: "windows-latest"
            args: "-- --no-default-features"
            rust_targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev libhidapi-dev libudev-dev
          version: 1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Cache node_modules
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Install frontend dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          cache-on-failure: true
          shared-key: "${{ matrix.platform }}"

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- ${{ matrix.args }}

      - name: Show sccache stats
        run: sccache --show-stats

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload Linux updater artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: updater-linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage.sig
            src-tauri/target/release/bundle/deb/*.deb.sig
          if-no-files-found: error

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

      - name: Upload Windows updater artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: updater-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
          if-no-files-found: error

  # Create release and upload all artifacts
  release:
    needs: [build-macos, build-linux-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -name "*" | sort

      - name: Generate latest.json
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${VERSION}"

          # Read signatures
          read_sig() { cat "$1" 2>/dev/null || echo ""; }

          SIG_MACOS_AARCH64=$(read_sig artifacts/updater-macos-aarch64/*.app.tar.gz.sig)
          SIG_MACOS_X64=$(read_sig artifacts/updater-macos-x64/*.app.tar.gz.sig)
          SIG_LINUX=$(read_sig artifacts/updater-linux/*.AppImage.sig)
          SIG_WINDOWS=$(read_sig artifacts/updater-windows/*.exe.sig)

          FILENAME_MACOS_AARCH64=$(basename artifacts/updater-macos-aarch64/*.app.tar.gz)
          FILENAME_MACOS_X64=$(basename artifacts/updater-macos-x64/*.app.tar.gz)
          FILENAME_LINUX=$(basename artifacts/updater-linux/*.AppImage.sig | sed 's/\.sig$//')
          FILENAME_WINDOWS=$(basename artifacts/updater-windows/*.exe.sig | sed 's/\.sig$//')

          # Fail fast if any filename resolved to a glob (file not found)
          for f in "$FILENAME_MACOS_AARCH64" "$FILENAME_MACOS_X64" "$FILENAME_LINUX" "$FILENAME_WINDOWS"; do
            if [[ "$f" == *'*'* ]]; then
              echo "ERROR: Updater file not found: $f — signing may have failed in a build job."
              exit 1
            fi
          done

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "See the release page for details: https://github.com/${REPO}/releases/tag/${VERSION}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "url": "${BASE_URL}/${FILENAME_MACOS_AARCH64}",
                "signature": "${SIG_MACOS_AARCH64}"
              },
              "darwin-x86_64": {
                "url": "${BASE_URL}/${FILENAME_MACOS_X64}",
                "signature": "${SIG_MACOS_X64}"
              },
              "linux-x86_64": {
                "url": "${BASE_URL}/${FILENAME_LINUX}",
                "signature": "${SIG_LINUX}"
              },
              "windows-x86_64": {
                "url": "${BASE_URL}/${FILENAME_WINDOWS}",
                "signature": "${SIG_WINDOWS}"
              }
            }
          }
          EOF

          echo "Generated latest.json:"
          cat latest.json

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.VERSION }}
          draft: true
          prerelease: false
          body: |
            ## Download

            Choose the appropriate installer for your platform:

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `.dmg` (aarch64) |
            | macOS (Intel) | `.dmg` (x64) |
            | Windows | `.exe` or `.msi` |
            | Linux | `.AppImage`, `.deb`, or `.rpm` |

            ### macOS Note

            This app is not signed with an Apple Developer certificate. On first launch, you may see a warning. To open:
            1. Right-click the app and select "Open"
            2. Click "Open" in the dialog

            Or run in Terminal: `xattr -cr /Applications/Slew.app`
          files: |
            artifacts/macos-aarch64/*.dmg
            artifacts/macos-x64/*.dmg
            artifacts/updater-macos-aarch64/*.app.tar.gz
            artifacts/updater-macos-aarch64/*.app.tar.gz.sig
            artifacts/updater-macos-x64/*.app.tar.gz
            artifacts/updater-macos-x64/*.app.tar.gz.sig
            artifacts/linux/deb/*.deb
            artifacts/linux/rpm/*.rpm
            artifacts/linux/appimage/*.AppImage
            artifacts/updater-linux/*.AppImage.sig
            artifacts/updater-linux/*.deb.sig
            artifacts/windows/nsis/*.exe
            artifacts/windows/msi/*.msi
            artifacts/updater-windows/*.exe.sig
            latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Slack
        if: success()
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🤖 Slew ${{ steps.version.outputs.VERSION }} draft release is ready for publishing!\n<${{ github.server_url }}/${{ github.repository }}/releases|View Release>"
            }
